name: Batch sync from notion DB
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.5"
      - name: Install dependencies
        run: |
          cd pipeline
          python -m pip install -r requirements.txt
      - name: Run sync posts script
        run: |
          cd pipeline
          python sync_posts_from_notion.py
        env:
          NOTION_API_KEY: ${{secrets.NOTION_API_KEY}}
          NOTION_POSTS_DB_ID: ${{secrets.NOTION_POSTS_DB_ID}}
      - name: Run sync projects script
        run: |
          cd pipeline
          python sync_projects_from_notion.py
        env:
          NOTION_API_KEY: ${{secrets.NOTION_API_KEY}}
          NOTION_PROJECTS_DB_ID: ${{secrets.NOTION_PROJECTS_DB_ID}}
      - name: Check diff
        id: diff
        run: |
          if git diff --quiet; then
           echo "changed=false" >> "$GITHUB_OUTPUT"
          else
           echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "chore: update generated files"
          git push
